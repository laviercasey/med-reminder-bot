name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  BOT_IMAGE: ghcr.io/${{ github.repository }}/bot

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.sha_short }}

      - name: Build and push Bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/bot.Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.BOT_IMAGE }}:latest
            ${{ env.BOT_IMAGE }}:${{ steps.meta.outputs.sha_short }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/med-reminder-bot
            export PREVIOUS_API_TAG=$(docker inspect --format='{{index .RepoTags 0}}' $(docker compose -f docker-compose.yml -f docker-compose.prod.yml ps -q api) 2>/dev/null || echo "none")
            export PREVIOUS_BOT_TAG=$(docker inspect --format='{{index .RepoTags 0}}' $(docker compose -f docker-compose.yml -f docker-compose.prod.yml ps -q bot) 2>/dev/null || echo "none")
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile migrate up migrate -d --wait
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            sleep 10
            if ! docker compose -f docker-compose.yml -f docker-compose.prod.yml ps api | grep -q "healthy"; then
              echo "API health check failed, rolling back..."
              docker compose -f docker-compose.yml -f docker-compose.prod.yml down
              if [ "$PREVIOUS_API_TAG" != "none" ]; then
                docker tag "$PREVIOUS_API_TAG" $(echo "$PREVIOUS_API_TAG" | cut -d: -f1):latest 2>/dev/null || true
              fi
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
              exit 1
            fi
            docker image prune -f

      - name: Deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::Deployment to production succeeded for commit ${{ steps.meta.outputs.sha_short }}"
          else
            echo "::error::Deployment to production failed for commit ${{ steps.meta.outputs.sha_short }}"
          fi
