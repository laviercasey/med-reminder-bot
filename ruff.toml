line-length = 99
target-version = "py312"

exclude = [
    "migrations/",
    ".venv/",
    "node_modules/",
    "frontend/",
]

[lint]
select = ["E", "F", "W", "I"]

[lint.isort]
known-first-party = ["api", "bot", "shared", "config", "database", "handlers", "services", "utils"]

[format]
quote-style = "double"
indent-style = "space"
