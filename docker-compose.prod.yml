services:
  postgres:
    container_name: med-postgres
    restart: unless-stopped
    ports: !reset []
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    container_name: med-redis
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  bot:
    image: ghcr.io/laviercasey/med-reminder-bot/bot:latest
    container_name: med-bot
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  api:
    image: ghcr.io/laviercasey/med-reminder-bot/api:latest
    container_name: med-api
    restart: unless-stopped
    command: uvicorn api.main:create_app --factory --host 0.0.0.0 --port 8000 --workers 4
    networks:
      - backend
      - caddy-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  migrate:
    image: ghcr.io/laviercasey/med-reminder-bot/api:latest
    container_name: med-migrate
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  nginx:
    profiles:
      - disabled

networks:
  caddy-net:
    external: true
